<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speaker Detect v2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{
  background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0) 0;
}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}

.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:100;background:#fff}

#speaker-box{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background .3s;position:relative;min-height:0;
}
#speaker-letter{
  font-size:min(45vw,280px);font-weight:900;line-height:1;
  transition:color .2s;letter-spacing:-4px;
}
#speaker-name{
  font-size:min(7vw,36px);font-weight:600;margin-top:12px;
  letter-spacing:6px;text-transform:uppercase;opacity:.7;
}
#status-text{
  font-size:min(4vw,18px);margin-top:20px;opacity:.4;letter-spacing:2px;
}

#chips-bar{
  display:flex;gap:4px;padding:12px 16px;justify-content:center;flex-wrap:wrap;
  background:#0a0a0a;flex-shrink:0;
}
.chip{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;border:2px solid #222;transition:all .2s;opacity:.3;
}
.chip.active{opacity:1;transform:scale(1.1)}

#controls{
  display:flex;gap:0;flex-shrink:0;border-top:1px solid #111;
}
#controls button{
  flex:1;padding:22px;border:none;font-family:inherit;
  font-size:18px;font-weight:700;letter-spacing:3px;
  cursor:pointer;transition:all .15s;
}
#controls button:active{opacity:.7}

#btn-start{background:#003300;color:#00ff88}
#btn-start.running{background:#330000;color:#ff4444}
#btn-reset{background:#0a0a0a;color:#444;border-left:1px solid #111}

#energy-bar-wrap{height:4px;background:#111;flex-shrink:0}
#energy-bar{height:100%;width:0%;transition:width .08s linear,background .3s;background:#333}

#version-tag{
  position:absolute;top:16px;right:16px;font-size:11px;color:#333;letter-spacing:1px;
}
#listening-dot{
  width:14px;height:14px;border-radius:50%;background:#333;
  position:absolute;top:18px;left:18px;transition:background .3s;
}
</style>
</head>
<body>

<!-- Energy bar at top -->
<div id="energy-bar-wrap"><div id="energy-bar"></div></div>

<!-- Main speaker display -->
<div id="speaker-box">
  <div id="listening-dot"></div>
  <div id="version-tag">v2.0</div>
  <div id="speaker-letter">?</div>
  <div id="speaker-name">TAP START</div>
  <div id="status-text">READY</div>
  <div id="debug-info" style="font-size:min(3vw,13px);margin-top:16px;opacity:.25;letter-spacing:1px"></div>
</div>

<!-- Speaker chips -->
<div id="chips-bar"></div>

<!-- Controls -->
<div id="controls">
  <button id="btn-start" onclick="toggle()">START</button>
  <button id="btn-reset" onclick="resetAll()">RESET</button>
</div>

<script>
const COLORS=["#FF6B35","#4ECDC4","#FFE66D","#A78BFA","#F38181","#34D399","#FCBAD3","#60A5FA"];
const FFT_SIZE=2048,NUM_BANDS=24,INTERVAL=50,WIN=6;
// Ultra-fast detection: minimal confirmations
const CONFIRM_CHG=1,CONFIRM_NEW=2,PROF_MAX=30;

let running=false,audioCtx,analyser,stream,timer;
let filterbank,profiles=[],win=[],curSpeaker=null,silenceN=0,changeN=0,beepCtx;
let sensitivity=0.52,mobileOffset=0;
let wakeLock=null;

// DOM refs
const elLetter=document.getElementById('speaker-letter');
const elName=document.getElementById('speaker-name');
const elStatus=document.getElementById('status-text');
const elDot=document.getElementById('listening-dot');
const elEnergyBar=document.getElementById('energy-bar');
const elSpeakerBox=document.getElementById('speaker-box');
const elChips=document.getElementById('chips-bar');
const elBtnStart=document.getElementById('btn-start');
const elDebug=document.getElementById('debug-info');

// === Audio math ===
const hz2mel=f=>2595*Math.log10(1+f/700);
const mel2hz=m=>700*(10**(m/2595)-1);

function buildFB(fftSz,sr,n){
  const bins=fftSz/2,mL=hz2mel(80),mH=hz2mel(Math.min(8000,sr/2));
  const pts=Array.from({length:n+2},(_,i)=>Math.round(mel2hz(mL+(mH-mL)*i/(n+1))*fftSz/sr));
  return Array.from({length:n},(_,i)=>{
    const f=new Float32Array(bins);
    for(let j=pts[i];j<pts[i+1]&&j<bins;j++) f[j]=(j-pts[i])/(pts[i+1]-pts[i]);
    for(let j=pts[i+1];j<pts[i+2]&&j<bins;j++) f[j]=(pts[i+2]-j)/(pts[i+2]-pts[i+1]);
    return f;
  });
}

function extract(fft,fb,sr){
  const mel=fb.map(f=>{let e=0;for(let i=0;i<f.length;i++)e+=10**(fft[i]/20)*f[i];return Math.log(Math.max(e,1e-10))});
  let num=0,den=0;
  for(let i=0;i<fft.length;i++){const m=10**(fft[i]/20),freq=i*sr/FFT_SIZE;num+=freq*m;den+=m}
  mel.push(den>0?num/den/(sr/2):0);
  return mel;
}

function vecMean(vs){
  if(!vs.length)return null;
  const m=new Array(vs[0].length).fill(0);
  vs.forEach(v=>v.forEach((x,i)=>m[i]+=x));
  return m.map(x=>x/vs.length);
}

function cosSim(a,b){
  let d=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]**2;nb+=b[i]**2}
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-10);
}

// === Visual feedback ===
function doubleFlash(){
  doOneFlash();
  setTimeout(doOneFlash,250);
  // Vibrate on mobile (Android; iOS ignores this but we try)
  try{if(navigator.vibrate)navigator.vibrate([100,80,100])}catch(_){}
}
function doOneFlash(){
  const f=document.createElement('div');
  f.className='flash-overlay';
  document.body.appendChild(f);
  f.style.opacity='0.7';
  f.style.animation='fadeOut .2s ease-out forwards';
  setTimeout(()=>f.remove(),250);
}

function beep(idx){
  try{
    if(!beepCtx)beepCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(beepCtx.state==="suspended")beepCtx.resume();
    const o=beepCtx.createOscillator(),g=beepCtx.createGain();
    o.connect(g);g.connect(beepCtx.destination);
    const f=520+idx*200;
    o.frequency.setValueAtTime(f,beepCtx.currentTime);
    o.frequency.setValueAtTime(f*1.25,beepCtx.currentTime+.04);
    o.frequency.setValueAtTime(f,beepCtx.currentTime+.08);
    g.gain.setValueAtTime(.25,beepCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,beepCtx.currentTime+.18);
    o.start(beepCtx.currentTime);o.stop(beepCtx.currentTime+.18);
  }catch(_){}
}

// === UI updates ===
function setSpeakerUI(idx){
  const c=COLORS[idx%COLORS.length];
  const letter=String.fromCharCode(65+idx);
  elLetter.textContent=letter;
  elLetter.style.color=c;
  elName.textContent='SPEAKER '+letter;
  elName.style.color=c;
  elSpeakerBox.style.background=c+'08';
  elEnergyBar.style.background=c;
}

function updateChips(total,active){
  elChips.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='chip'+(i===active?' active':'');
    const c=COLORS[i%COLORS.length];
    d.textContent=String.fromCharCode(65+i);
    d.style.color=c;
    if(i===active){
      d.style.borderColor=c;
      d.style.background=c+'20';
    }
    elChips.appendChild(d);
  }
}

// === Wake lock ===
async function requestWake(){
  try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch(_){}
}
function releaseWake(){if(wakeLock){wakeLock.release();wakeLock=null}}

// === Mic & detection ===
async function startMic(){
  try{
    // Try raw audio first, fallback to processed
    try{
      stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    }catch(_){
      stream=await navigator.mediaDevices.getUserMedia({audio:true});
    }
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") await audioCtx.resume();

    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=FFT_SIZE;analyser.smoothingTimeConstant=.2;
    src.connect(analyser);
    filterbank=buildFB(FFT_SIZE,audioCtx.sampleRate,NUM_BANDS);

    // Detect forced audio processing (iOS)
    const trk=stream.getAudioTracks()[0];
    const settings=trk.getSettings?trk.getSettings():{};
    if(settings.echoCancellation||settings.noiseSuppression||settings.autoGainControl){
      mobileOffset=0.10;
    }else{
      mobileOffset=0;
    }

    profiles=[];win=[];curSpeaker=null;silenceN=0;changeN=0;
    elChips.innerHTML='';

    running=true;
    requestWake();
    elBtnStart.textContent='STOP';
    elBtnStart.classList.add('running');
    elLetter.textContent='...';
    elLetter.style.color='#333';
    elName.textContent='LISTENING';
    elName.style.color='#444';
    elStatus.textContent='SPEAK NOW';
    elDot.style.background='#ffaa00';
    elSpeakerBox.style.background='#000';

    const fft=new Float32Array(analyser.frequencyBinCount);
    const sr=audioCtx.sampleRate;

    timer=setInterval(()=>{
      analyser.getFloatFrequencyData(fft);
      let tot=0,n=0;
      for(let i=0;i<fft.length;i++){if(fft[i]>-100){tot+=10**(fft[i]/10);n++}}
      const avg=n>0?10*Math.log10(tot/n):-100;
      const pct=Math.max(0,Math.min(100,(avg+75)*1.8));
      const thr=-60+(1-sensitivity)*12;
      const isSpeaking=avg>=thr;

      elEnergyBar.style.width=pct+'%';
      elDebug.textContent='dB:'+avg.toFixed(0)+' thr:'+thr.toFixed(0)+' spk:'+(isSpeaking?'YES':'no')+' win:'+win.length+' profiles:'+profiles.length;

      if(!isSpeaking){
        silenceN++;
        if(silenceN>5){
          elStatus.textContent=curSpeaker!==null?'PAUSED':'WAITING...';
          elDot.style.background='#ffaa00';
          elDot.style.animation='none';
          if(curSpeaker===null)elEnergyBar.style.background='#333';
        }
        return;
      }
      silenceN=0;
      elStatus.textContent='VOICE ACTIVE';
      elDot.style.background='#00ff88';
      elDot.style.animation='breathe 1s infinite';

      const feat=extract(fft,filterbank,sr);
      win.push(feat);
      if(win.length>WIN)win.shift();
      if(win.length<2){elStatus.textContent='ANALYZING...';return}

      const curMean=vecMean(win);

      if(profiles.length===0){
        profiles.push({frames:[...win],mean:curMean});
        curSpeaker=0;setSpeakerUI(0);updateChips(1,0);
        return;
      }

      let bestI=-1,bestS=-1;
      for(let i=0;i<profiles.length;i++){
        const s=cosSim(curMean,profiles[i].mean);
        if(s>bestS){bestS=s;bestI=i}
      }

      const effSens=sensitivity-mobileOffset;
      if(bestS>=effSens){
        if(bestI!==curSpeaker){
          changeN++;
          if(changeN>=CONFIRM_CHG){
            curSpeaker=bestI;setSpeakerUI(bestI);updateChips(profiles.length,bestI);
            beep(bestI);doubleFlash();
            changeN=0;win=[];
          }
        }else{
          changeN=0;
          const p=profiles[bestI];
          p.frames.push(...win.slice(-2));
          if(p.frames.length>PROF_MAX)p.frames=p.frames.slice(-PROF_MAX);
          p.mean=vecMean(p.frames);
        }
      }else if(bestS<effSens-.10){
        changeN++;
        if(changeN>=CONFIRM_NEW){
          const ni=profiles.length;
          profiles.push({frames:[...win],mean:curMean});
          curSpeaker=ni;setSpeakerUI(ni);updateChips(ni+1,ni);
          beep(ni);doubleFlash();
          changeN=0;win=[];
        }
      }
    },INTERVAL);

  }catch(e){
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      elStatus.textContent='MIC DENIED';
      elName.textContent='ALLOW MIC & RELOAD';
      elName.style.color='#ff4444';
    }else if(e.name==='NotFoundError'){
      elStatus.textContent='NO MIC FOUND';
    }else{
      elStatus.textContent='ERROR: '+e.message;
    }
  }
}

function stopMic(){
  if(timer)clearInterval(timer);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close();
  running=false;
  releaseWake();
  elBtnStart.textContent='START';
  elBtnStart.classList.remove('running');
  elDot.style.background='#333';
  elDot.style.animation='none';
  elStatus.textContent='STOPPED';
}

function toggle(){running?stopMic():startMic()}

function resetAll(){
  profiles=[];win=[];curSpeaker=null;silenceN=0;changeN=0;
  elLetter.textContent='?';elLetter.style.color='#333';
  elName.textContent='TAP START';elName.style.color='#444';
  elStatus.textContent='READY';
  elSpeakerBox.style.background='#000';
  elChips.innerHTML='';
  elEnergyBar.style.width='0%';
  elEnergyBar.style.background='#333';
}
</script>
</body>
</html>
