<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speaker Detect v3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{
  background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0) 0;
}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:100;background:#fff}

#speaker-box{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background .3s;position:relative;min-height:0;
}
#speaker-letter{
  font-size:min(45vw,280px);font-weight:900;line-height:1;
  transition:color .2s;letter-spacing:-4px;
}
#speaker-name{
  font-size:min(7vw,36px);font-weight:600;margin-top:12px;
  letter-spacing:6px;text-transform:uppercase;opacity:.7;
}
#status-text{
  font-size:min(4vw,18px);margin-top:20px;opacity:.4;letter-spacing:2px;
}

#chips-bar{
  display:flex;gap:4px;padding:12px 16px;justify-content:center;flex-wrap:wrap;
  background:#0a0a0a;flex-shrink:0;
}
.chip{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;border:2px solid #222;transition:all .2s;opacity:.3;
}
.chip.active{opacity:1;transform:scale(1.1)}

#controls{
  display:flex;gap:0;flex-shrink:0;border-top:1px solid #111;
}
#controls button{
  flex:1;padding:22px;border:none;font-family:inherit;
  font-size:18px;font-weight:700;letter-spacing:3px;
  cursor:pointer;transition:all .15s;
}
#controls button:active{opacity:.7}

#btn-start{background:#003300;color:#00ff88}
#btn-start.running{background:#330000;color:#ff4444}
#btn-reset{background:#0a0a0a;color:#444;border-left:1px solid #111}

#energy-bar-wrap{height:4px;background:#111;flex-shrink:0}
#energy-bar{height:100%;width:0%;transition:width .08s linear,background .3s;background:#333}

#version-tag{position:absolute;top:16px;right:16px;font-size:11px;color:#333;letter-spacing:1px}
#listening-dot{width:14px;height:14px;border-radius:50%;background:#333;position:absolute;top:18px;left:18px;transition:background .3s}
#gpu-badge{position:absolute;top:36px;left:18px;font-size:8px;color:#333;letter-spacing:1px}
</style>
</head>
<body>

<div id="energy-bar-wrap"><div id="energy-bar"></div></div>

<div id="speaker-box">
  <div id="listening-dot"></div>
  <div id="gpu-badge">GPU</div>
  <div id="version-tag">v3.0</div>
  <div id="speaker-letter">?</div>
  <div id="speaker-name">LOADING TF.js...</div>
  <div id="status-text">INITIALIZING GPU ENGINE</div>
  <div id="debug-info" style="font-size:min(3vw,13px);margin-top:16px;opacity:.25;letter-spacing:1px"></div>
</div>

<div id="chips-bar"></div>

<div id="controls">
  <button id="btn-start" onclick="toggle()" disabled>START</button>
  <button id="btn-reset" onclick="resetAll()">RESET</button>
</div>

<!-- TensorFlow.js — GPU-accelerated tensor operations -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

<script>
const COLORS=["#FF6B35","#4ECDC4","#FFE66D","#A78BFA","#F38181","#34D399","#FCBAD3","#60A5FA"];
const FFT_SIZE=2048;
const NUM_MEL=40;       // 40 mel bands (was 24)
const NUM_MFCC=20;      // 20 MFCCs from DCT
const INTERVAL=80;      // 80ms — accuracy over speed
const WIN=10;           // 10 frames = 800ms analysis window
const PROF_FRAMES=15;   // 15 voice frames before freezing profile

let running=false,audioCtx,analyser,stream,timer,beepCtx;
let melFilterbank=null; // TF.js tensor — GPU mel filterbank matrix
let dctMatrix=null;     // TF.js tensor — GPU DCT matrix
let profiles=[],frameBuffer=[],curSpeaker=null,changeN=0;
let noiseFloor=-100,calibrating=true,calibFrames=[];
let wakeLock=null,notifyPermission='default';
let tfReady=false;

// DOM
const $=id=>document.getElementById(id);
const el={
  letter:$('speaker-letter'),name:$('speaker-name'),status:$('status-text'),
  dot:$('listening-dot'),eBar:$('energy-bar'),box:$('speaker-box'),
  chips:$('chips-bar'),btnS:$('btn-start'),debug:$('debug-info'),
  gpu:$('gpu-badge')
};

// ==============================
// TF.js GPU Engine
// ==============================

// Build mel filterbank as a GPU tensor (NUM_FFT_BINS x NUM_MEL)
function buildMelFilterbankTensor(fftSize,sampleRate,numMel){
  const nBins=fftSize/2;
  const fMin=80,fMax=Math.min(7600,sampleRate/2);
  const melMin=2595*Math.log10(1+fMin/700);
  const melMax=2595*Math.log10(1+fMax/700);
  const melPts=[];
  for(let i=0;i<numMel+2;i++) melPts.push(700*(Math.pow(10,(melMin+(melMax-melMin)*i/(numMel+1))/2595)-1));
  const binPts=melPts.map(f=>Math.round(f*fftSize/sampleRate));

  const fb=new Float32Array(nBins*numMel);
  for(let m=0;m<numMel;m++){
    for(let k=binPts[m];k<binPts[m+1]&&k<nBins;k++){
      fb[k*numMel+m]=(k-binPts[m])/(binPts[m+1]-binPts[m]+1e-10);
    }
    for(let k=binPts[m+1];k<binPts[m+2]&&k<nBins;k++){
      fb[k*numMel+m]=(binPts[m+2]-k)/(binPts[m+2]-binPts[m+1]+1e-10);
    }
  }
  return tf.tensor2d(fb,[nBins,numMel]);
}

// Build DCT-II matrix as a GPU tensor (NUM_MEL x NUM_MFCC)
function buildDCTMatrix(numMel,numMfcc){
  const dct=new Float32Array(numMel*numMfcc);
  for(let k=0;k<numMfcc;k++){
    for(let n=0;n<numMel;n++){
      dct[n*numMfcc+k]=Math.cos(Math.PI*k*(2*n+1)/(2*numMel));
    }
  }
  return tf.tensor2d(dct,[numMel,numMfcc]);
}

// Extract rich speaker embedding from FFT data — ALL on GPU
// Input: Float32Array of FFT magnitudes (dB)
// Output: Float32Array of ~120-dim speaker embedding
function extractEmbedding(fftData){
  return tf.tidy(()=>{
    // 1. Convert dB FFT to linear magnitude on GPU
    const fftTensor=tf.tensor1d(fftData);
    const linearMag=tf.pow(10,tf.div(fftTensor,20));

    // 2. Apply mel filterbank (matrix multiply on GPU)
    const melEnergies=tf.matMul(linearMag.reshape([1,-1]),melFilterbank);

    // 3. Log compression
    const logMel=tf.log(tf.add(melEnergies,1e-10));

    // 4. DCT to get MFCCs (matrix multiply on GPU)
    const mfcc=tf.matMul(logMel,dctMatrix); // [1, NUM_MFCC]

    // 5. Also keep mel energies for extra discrimination
    // Return concatenated: MFCCs + log mel energies = 20 + 40 = 60 dims per frame
    const combined=tf.concat([mfcc,logMel],1);
    return combined.dataSync(); // back to CPU as Float32Array
  });
}

// Compute speaker embedding from multiple frames — statistics on GPU
// Takes array of per-frame features, returns aggregated embedding
function computeSpeakerEmbedding(frames){
  return tf.tidy(()=>{
    const frameTensor=tf.tensor2d(frames); // [numFrames, 60]

    // Mean across time
    const mean=frameTensor.mean(0); // [60]

    // Standard deviation across time (captures voice stability)
    const variance=frameTensor.sub(mean).square().mean(0);
    const std=variance.sqrt(); // [60]

    // Concatenate: mean + std = 120-dimensional embedding
    const embedding=tf.concat([mean,std]);
    return embedding.dataSync();
  });
}

// Cosine similarity on GPU
function cosSimilarity(a,b){
  return tf.tidy(()=>{
    const ta=tf.tensor1d(a);
    const tb=tf.tensor1d(b);
    const dot=ta.mul(tb).sum();
    const normA=ta.norm();
    const normB=tb.norm();
    return dot.div(normA.mul(normB).add(1e-10)).dataSync()[0];
  });
}

// ==============================
// Notifications & UI
// ==============================

async function requestNotifyPermission(){
  if(!('Notification' in window))return;
  try{notifyPermission=await Notification.requestPermission()}catch(_){
    Notification.requestPermission(function(p){notifyPermission=p});
  }
}

function notifySpeakerChange(letter){
  if(notifyPermission==='granted'){
    try{
      new Notification('Speaker Changed',{
        body:'Now speaking: Speaker '+letter,
        tag:'speaker-change',renotify:true,silent:false
      });
    }catch(_){}
  }
  try{if(navigator.vibrate)navigator.vibrate([100,80,100])}catch(_){}
}

function doubleFlash(){
  doOneFlash();setTimeout(doOneFlash,250);
}
function doOneFlash(){
  const f=document.createElement('div');
  f.className='flash-overlay';document.body.appendChild(f);
  f.style.opacity='0.7';f.style.animation='fadeOut .2s ease-out forwards';
  setTimeout(()=>f.remove(),250);
}

function beep(idx){
  try{
    if(!beepCtx)beepCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(beepCtx.state==='suspended')beepCtx.resume();
    const o=beepCtx.createOscillator(),g=beepCtx.createGain();
    o.connect(g);g.connect(beepCtx.destination);
    const f=520+idx*200;
    o.frequency.setValueAtTime(f,beepCtx.currentTime);
    o.frequency.setValueAtTime(f*1.25,beepCtx.currentTime+.04);
    o.frequency.setValueAtTime(f,beepCtx.currentTime+.08);
    g.gain.setValueAtTime(.25,beepCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,beepCtx.currentTime+.18);
    o.start(beepCtx.currentTime);o.stop(beepCtx.currentTime+.18);
  }catch(_){}
}

function setSpeakerUI(idx){
  const c=COLORS[idx%COLORS.length],letter=String.fromCharCode(65+idx);
  el.letter.textContent=letter;el.letter.style.color=c;
  el.name.textContent='SPEAKER '+letter;el.name.style.color=c;
  el.box.style.background=c+'08';el.eBar.style.background=c;
}

function updateChips(total,active){
  el.chips.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='chip'+(i===active?' active':'');
    const c=COLORS[i%COLORS.length];
    d.textContent=String.fromCharCode(65+i);d.style.color=c;
    if(i===active){d.style.borderColor=c;d.style.background=c+'20'}
    el.chips.appendChild(d);
  }
}

function onSpeakerChange(idx){
  const letter=String.fromCharCode(65+idx);
  setSpeakerUI(idx);updateChips(profiles.length,idx);
  beep(idx);doubleFlash();notifySpeakerChange(letter);
}

async function requestWake(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch(_){}}
function releaseWake(){if(wakeLock){wakeLock.release();wakeLock=null}}

// ==============================
// Init TF.js
// ==============================
async function initTF(){
  await tf.ready();
  const backend=tf.getBackend();
  el.gpu.textContent=backend.toUpperCase();
  el.gpu.style.color=backend==='webgl'?'#00ff88':'#ffaa00';
  el.name.textContent='TAP START';
  el.status.textContent=backend.toUpperCase()+' READY · 120-DIM EMBEDDINGS';
  el.btnS.disabled=false;
  tfReady=true;
}
initTF();

// ==============================
// Main Engine
// ==============================
async function startMic(){
  if(!tfReady)return;
  try{
    await requestNotifyPermission();

    try{
      stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    }catch(_){
      stream=await navigator.mediaDevices.getUserMedia({audio:true});
    }
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')await audioCtx.resume();

    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=FFT_SIZE;analyser.smoothingTimeConstant=.1;
    src.connect(analyser);

    // Build GPU tensors for this sample rate
    if(melFilterbank)melFilterbank.dispose();
    if(dctMatrix)dctMatrix.dispose();
    melFilterbank=buildMelFilterbankTensor(FFT_SIZE,audioCtx.sampleRate,NUM_MEL);
    dctMatrix=buildDCTMatrix(NUM_MEL,NUM_MFCC);

    profiles=[];frameBuffer=[];curSpeaker=null;changeN=0;
    calibrating=true;calibFrames=[];noiseFloor=-100;
    el.chips.innerHTML='';

    running=true;requestWake();
    el.btnS.textContent='STOP';el.btnS.classList.add('running');
    el.letter.textContent='...';el.letter.style.color='#333';
    el.name.textContent='CALIBRATING';el.name.style.color='#ffaa00';
    el.status.textContent='STAY QUIET — MEASURING NOISE...';
    el.dot.style.background='#ffaa00';el.box.style.background='#000';

    const fft=new Float32Array(analyser.frequencyBinCount);

    timer=setInterval(()=>{
      analyser.getFloatFrequencyData(fft);

      // Compute energy
      let tot=0,n=0;
      for(let i=0;i<fft.length;i++){if(fft[i]>-100){tot+=10**(fft[i]/10);n++}}
      const avg=n>0?10*Math.log10(tot/n):-100;
      const pct=Math.max(0,Math.min(100,(avg+80)*2));
      el.eBar.style.width=pct+'%';

      // === PHASE 1: Calibrate noise floor ===
      if(calibrating){
        calibFrames.push(avg);
        el.debug.textContent='Calibrating... '+calibFrames.length+'/20 dB:'+avg.toFixed(0);
        if(calibFrames.length>=20){
          const sum=calibFrames.reduce((a,b)=>a+b,0);
          noiseFloor=sum/calibFrames.length+10; // +10dB margin for voices
          calibrating=false;
          el.name.textContent='LISTENING';el.name.style.color='#444';
          el.status.textContent='SPEAK NOW';
        }
        return;
      }

      // === PHASE 2: Voice gate ===
      const isVoice=avg>noiseFloor;

      if(!isVoice){
        if(frameBuffer.length>0)frameBuffer=[];
        changeN=0;
        el.dot.style.background='#00ff88';el.dot.style.animation='none';
        el.status.textContent=curSpeaker!==null?'ACTIVE — WAITING':'ACTIVE — SPEAK NOW';
        el.debug.textContent='dB:'+avg.toFixed(0)+' floor:'+noiseFloor.toFixed(0)+' (no voice)';
        return;
      }

      // Voice detected — extract features on GPU
      el.dot.style.animation='breathe 1s infinite';
      el.status.textContent='ANALYZING VOICE...';

      const frameFeatures=extractEmbedding(fft); // 60-dim per frame, computed on GPU
      frameBuffer.push(Array.from(frameFeatures));
      if(frameBuffer.length>WIN)frameBuffer.shift();

      // Need enough voice frames for reliable embedding
      if(frameBuffer.length<5){
        el.debug.textContent='dB:'+avg.toFixed(0)+' collecting voice... '+frameBuffer.length+'/5';
        return;
      }

      // Compute 120-dim speaker embedding from frame buffer (stats on GPU)
      const embedding=computeSpeakerEmbedding(frameBuffer);

      // Compare against all profiles
      let bestI=-1,bestS=-1;
      let simText='';
      for(let i=0;i<profiles.length;i++){
        const s=cosSimilarity(embedding,profiles[i].embedding);
        simText+=String.fromCharCode(65+i)+':'+s.toFixed(3)+' ';
        if(s>bestS){bestS=s;bestI=i}
      }

      // Threshold — lower = more sensitive to voice differences
      const threshold=0.82;
      el.debug.textContent='dB:'+avg.toFixed(0)+' thr:'+threshold+' dim:120 '+simText;
      el.status.textContent='VOICE DETECTED';

      // First speaker
      if(profiles.length===0){
        profiles.push({
          embedding:Array.from(embedding),
          frames:[...frameBuffer],
          frozen:false,
          frameCount:frameBuffer.length
        });
        curSpeaker=0;onSpeakerChange(0);
        return;
      }

      if(bestS>=threshold){
        // Matches existing speaker
        if(bestI!==curSpeaker){
          curSpeaker=bestI;onSpeakerChange(bestI);
          frameBuffer=[];
        }else{
          // Same speaker — build up profile then freeze
          const p=profiles[bestI];
          if(!p.frozen){
            p.frames.push(Array.from(frameFeatures));
            p.frameCount++;
            if(p.frameCount>=PROF_FRAMES){
              // Re-compute final frozen embedding from all collected frames
              p.embedding=Array.from(computeSpeakerEmbedding(p.frames.slice(-PROF_FRAMES)));
              p.frozen=true;
              el.debug.textContent+=' [FROZEN '+String.fromCharCode(65+bestI)+']';
            }
          }
        }
        changeN=0;
      }else{
        // Doesn't match — new speaker
        changeN++;
        if(changeN>=2){
          const ni=profiles.length;
          profiles.push({
            embedding:Array.from(embedding),
            frames:[...frameBuffer],
            frozen:false,
            frameCount:frameBuffer.length
          });
          curSpeaker=ni;onSpeakerChange(ni);
          changeN=0;frameBuffer=[];
        }
      }
    },INTERVAL);

  }catch(e){
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      el.status.textContent='MIC DENIED';
      el.name.textContent='ALLOW MIC & RELOAD';el.name.style.color='#ff4444';
    }else if(e.name==='NotFoundError'){
      el.status.textContent='NO MIC FOUND';
    }else{
      el.status.textContent='ERROR: '+e.message;
    }
  }
}

function stopMic(){
  if(timer)clearInterval(timer);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close();
  running=false;releaseWake();
  el.btnS.textContent='START';el.btnS.classList.remove('running');
  el.dot.style.background='#333';el.dot.style.animation='none';
  el.status.textContent='STOPPED';
}

function toggle(){running?stopMic():startMic()}

function resetAll(){
  profiles=[];frameBuffer=[];curSpeaker=null;changeN=0;
  el.letter.textContent='?';el.letter.style.color='#333';
  el.name.textContent='TAP START';el.name.style.color='#444';
  el.status.textContent='READY';el.box.style.background='#000';
  el.chips.innerHTML='';el.eBar.style.width='0%';el.eBar.style.background='#333';
}
</script>
</body>
</html>
