<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speaker Detect v3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{
  background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0) 0;
}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:100;background:#fff}

#speaker-box{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:background .3s;position:relative;min-height:0;
}
#speaker-letter{
  font-size:min(45vw,280px);font-weight:900;line-height:1;
  transition:color .2s;letter-spacing:-4px;
}
#speaker-name{
  font-size:min(7vw,36px);font-weight:600;margin-top:12px;
  letter-spacing:6px;text-transform:uppercase;opacity:.7;
}
#status-text{
  font-size:min(4vw,18px);margin-top:20px;opacity:.4;letter-spacing:2px;
}

#chips-bar{
  display:flex;gap:4px;padding:12px 16px;justify-content:center;flex-wrap:wrap;
  background:#0a0a0a;flex-shrink:0;
}
.chip{
  width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;border:2px solid #222;transition:all .2s;opacity:.3;
}
.chip.active{opacity:1;transform:scale(1.1)}

#controls{
  display:flex;gap:0;flex-shrink:0;border-top:1px solid #111;
}
#controls button{
  flex:1;padding:22px;border:none;font-family:inherit;
  font-size:18px;font-weight:700;letter-spacing:3px;
  cursor:pointer;transition:all .15s;
}
#controls button:active{opacity:.7}

#btn-start{background:#003300;color:#00ff88}
#btn-start.running{background:#330000;color:#ff4444}
#btn-reset{background:#0a0a0a;color:#444;border-left:1px solid #111}

#energy-bar-wrap{height:4px;background:#111;flex-shrink:0}
#energy-bar{height:100%;width:0%;transition:width .08s linear,background .3s;background:#333}

#version-tag{position:absolute;top:16px;right:16px;font-size:11px;color:#333;letter-spacing:1px}
#model-badge{position:absolute;top:36px;right:16px;font-size:8px;color:#333;letter-spacing:1px}
#listening-dot{width:14px;height:14px;border-radius:50%;background:#333;position:absolute;top:18px;left:18px;transition:background .3s}

#load-progress{
  position:absolute;bottom:20px;left:20px;right:20px;
  font-size:11px;color:#444;text-align:center;letter-spacing:1px;
}
#load-bar{height:2px;background:#111;border-radius:1px;margin-top:6px;overflow:hidden}
#load-bar-fill{height:100%;width:0%;background:#4ECDC4;transition:width .3s}
</style>
</head>
<body>

<div id="energy-bar-wrap"><div id="energy-bar"></div></div>

<div id="speaker-box">
  <div id="listening-dot"></div>
  <div id="version-tag">v3.0</div>
  <div id="model-badge">PYANNOTE</div>
  <div id="speaker-letter">?</div>
  <div id="speaker-name">LOADING AI MODEL...</div>
  <div id="status-text">DOWNLOADING PYANNOTE (5MB)</div>
  <div id="debug-info" style="font-size:min(3vw,13px);margin-top:16px;opacity:.25;letter-spacing:1px"></div>
  <div id="load-progress">
    <span id="load-text">Initializing...</span>
    <div id="load-bar"><div id="load-bar-fill"></div></div>
  </div>
</div>

<div id="chips-bar"></div>

<div id="controls">
  <button id="btn-start" onclick="toggle()" disabled>LOADING...</button>
  <button id="btn-reset" onclick="resetAll()">RESET</button>
</div>

<script type="module">
import { AutoProcessor, AutoModelForAudioFrameClassification } from
  'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

const COLORS=["#FF6B35","#4ECDC4","#FFE66D","#A78BFA","#F38181","#34D399","#FCBAD3","#60A5FA"];
const TARGET_SR=16000; // pyannote expects 16kHz
const CHUNK_SEC=10;    // 10-second analysis window
const CHUNK_SAMPLES=TARGET_SR*CHUNK_SEC; // 160000
const PROCESS_INTERVAL=2500; // Run model every 2.5 seconds (accuracy > speed)

let running=false,audioCtx,stream,scriptNode,beepCtx;
let audioRingBuffer=new Float32Array(0);
let deviceSR=48000;
let model=null,processor=null;
let curSpeaker=null,processTimer=null;
let wakeLock=null,notifyPermission='default';

// DOM
const $=id=>document.getElementById(id);
const el={
  letter:$('speaker-letter'),name:$('speaker-name'),status:$('status-text'),
  dot:$('listening-dot'),eBar:$('energy-bar'),box:$('speaker-box'),
  chips:$('chips-bar'),btnS:$('btn-start'),debug:$('debug-info'),
  loadText:$('load-text'),loadBar:$('load-bar-fill'),loadProgress:$('load-progress')
};

// ==============================
// Load pyannote model
// ==============================
async function loadModel(){
  try{
    el.loadText.textContent='Loading processor...';
    el.loadBar.style.width='20%';

    const modelId='onnx-community/pyannote-segmentation-3.0';

    processor=await AutoProcessor.from_pretrained(modelId);
    el.loadText.textContent='Loading AI model (5MB)...';
    el.loadBar.style.width='50%';

    model=await AutoModelForAudioFrameClassification.from_pretrained(modelId,{
      dtype:'fp32'
    });
    el.loadBar.style.width='100%';
    el.loadText.textContent='Model ready!';

    setTimeout(()=>{
      el.loadProgress.style.display='none';
      el.name.textContent='TAP START';
      el.status.textContent='PYANNOTE AI · 7000+ SPEAKERS TRAINED';
      el.btnS.textContent='START';
      el.btnS.disabled=false;
    },500);
  }catch(e){
    el.loadText.textContent='Failed to load model: '+e.message;
    el.status.textContent='ERROR';
    console.error('Model load error:',e);
  }
}
loadModel();

// ==============================
// Audio resampling (device SR → 16kHz)
// ==============================
function resampleTo16k(inputData,fromRate){
  if(fromRate===TARGET_SR) return inputData;
  const ratio=fromRate/TARGET_SR;
  const newLen=Math.floor(inputData.length/ratio);
  const output=new Float32Array(newLen);
  for(let i=0;i<newLen;i++){
    const srcIdx=i*ratio;
    const lo=Math.floor(srcIdx);
    const hi=Math.min(lo+1,inputData.length-1);
    const frac=srcIdx-lo;
    output[i]=inputData[lo]*(1-frac)+inputData[hi]*frac;
  }
  return output;
}

// ==============================
// Process audio with pyannote
// ==============================
async function processAudio(){
  if(!running||!model||audioRingBuffer.length<deviceSR*3) return;

  try{
    // Get last 10 seconds of audio (or whatever we have)
    const samplesToTake=Math.min(audioRingBuffer.length,deviceSR*CHUNK_SEC);
    const rawChunk=audioRingBuffer.slice(-samplesToTake);

    // Resample to 16kHz
    const audio16k=resampleTo16k(rawChunk,deviceSR);

    // Pad to exactly 10 seconds if needed
    let inputAudio;
    if(audio16k.length>=CHUNK_SAMPLES){
      inputAudio=audio16k.slice(-CHUNK_SAMPLES);
    }else{
      inputAudio=new Float32Array(CHUNK_SAMPLES);
      inputAudio.set(audio16k,CHUNK_SAMPLES-audio16k.length);
    }

    // Run pyannote model
    const inputs=await processor(inputAudio);
    const output=await model(inputs);
    const logits=output.logits.data; // Float32Array
    const numFrames=output.logits.dims[1]; // ~767
    const numClasses=output.logits.dims[2]; // 3 speaker channels (or 7)

    // Analyze the LAST 2 seconds of output (most recent speech)
    const framesPerSec=numFrames/CHUNK_SEC;
    const analyzeFrames=Math.floor(framesPerSec*2);
    const startFrame=numFrames-analyzeFrames;

    // Count active frames per speaker in the last 2 seconds
    const speakerActivity=new Array(numClasses).fill(0);
    let totalActiveFrames=0;

    for(let f=startFrame;f<numFrames;f++){
      for(let s=0;s<numClasses;s++){
        const val=logits[f*numClasses+s];
        // Sigmoid to get probability
        const prob=1/(1+Math.exp(-val));
        if(prob>0.5){
          speakerActivity[s]++;
          totalActiveFrames++;
        }
      }
    }

    // Find dominant speaker
    let dominantSpeaker=-1;
    let maxActivity=0;
    const activityText=[];
    for(let s=0;s<Math.min(numClasses,3);s++){
      activityText.push(String.fromCharCode(65+s)+':'+speakerActivity[s]);
      if(speakerActivity[s]>maxActivity){
        maxActivity=speakerActivity[s];
        dominantSpeaker=s;
      }
    }

    el.debug.textContent='frames:'+numFrames+' ch:'+numClasses+' '+activityText.join(' ')+' active:'+totalActiveFrames;

    if(totalActiveFrames<5){
      // Nobody speaking in the last 2 seconds
      el.status.textContent='ACTIVE — NO SPEECH DETECTED';
      return;
    }

    el.status.textContent='ANALYZING...';

    // Check if speaker changed
    if(dominantSpeaker>=0 && dominantSpeaker!==curSpeaker){
      const prevSpeaker=curSpeaker;
      curSpeaker=dominantSpeaker;
      setSpeakerUI(curSpeaker);

      // Count total unique speakers seen
      const uniqueSpeakers=new Set();
      for(let s=0;s<Math.min(numClasses,3);s++){
        if(speakerActivity[s]>2)uniqueSpeakers.add(s);
      }
      // Include previously seen speakers
      if(prevSpeaker!==null)uniqueSpeakers.add(prevSpeaker);
      uniqueSpeakers.add(curSpeaker);

      updateChips(Math.max(uniqueSpeakers.size,curSpeaker+1),curSpeaker);

      if(prevSpeaker!==null){
        // Speaker CHANGED — notify!
        beep(curSpeaker);
        doubleFlash();
        notifySpeakerChange(String.fromCharCode(65+curSpeaker));
      }

      el.status.textContent='SPEAKER '+String.fromCharCode(65+curSpeaker);
    }else if(dominantSpeaker>=0){
      el.status.textContent='SPEAKER '+String.fromCharCode(65+curSpeaker);
    }

  }catch(e){
    el.debug.textContent='Process error: '+e.message;
    console.error('Process error:',e);
  }
}

// ==============================
// Notifications & UI
// ==============================
async function requestNotifyPermission(){
  if(!('Notification' in window))return;
  try{notifyPermission=await Notification.requestPermission()}catch(_){
    Notification.requestPermission(function(p){notifyPermission=p});
  }
}

function notifySpeakerChange(letter){
  if(notifyPermission==='granted'){
    try{
      new Notification('Speaker Changed',{
        body:'Now speaking: Speaker '+letter,
        tag:'speaker-change',renotify:true,silent:false
      });
    }catch(_){}
  }
  try{if(navigator.vibrate)navigator.vibrate([100,80,100])}catch(_){}
}

function doubleFlash(){doOneFlash();setTimeout(doOneFlash,250)}
function doOneFlash(){
  const f=document.createElement('div');
  f.className='flash-overlay';document.body.appendChild(f);
  f.style.opacity='0.7';f.style.animation='fadeOut .2s ease-out forwards';
  setTimeout(()=>f.remove(),250);
}

function beep(idx){
  try{
    if(!beepCtx)beepCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(beepCtx.state==='suspended')beepCtx.resume();
    const o=beepCtx.createOscillator(),g=beepCtx.createGain();
    o.connect(g);g.connect(beepCtx.destination);
    const f=520+idx*200;
    o.frequency.setValueAtTime(f,beepCtx.currentTime);
    o.frequency.setValueAtTime(f*1.25,beepCtx.currentTime+.04);
    o.frequency.setValueAtTime(f,beepCtx.currentTime+.08);
    g.gain.setValueAtTime(.25,beepCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,beepCtx.currentTime+.18);
    o.start(beepCtx.currentTime);o.stop(beepCtx.currentTime+.18);
  }catch(_){}
}

function setSpeakerUI(idx){
  const c=COLORS[idx%COLORS.length],letter=String.fromCharCode(65+idx);
  el.letter.textContent=letter;el.letter.style.color=c;
  el.name.textContent='SPEAKER '+letter;el.name.style.color=c;
  el.box.style.background=c+'08';el.eBar.style.background=c;
}

function updateChips(total,active){
  el.chips.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='chip'+(i===active?' active':'');
    const c=COLORS[i%COLORS.length];
    d.textContent=String.fromCharCode(65+i);d.style.color=c;
    if(i===active){d.style.borderColor=c;d.style.background=c+'20'}
    el.chips.appendChild(d);
  }
}

async function requestWake(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch(_){}}
function releaseWake(){if(wakeLock){wakeLock.release();wakeLock=null}}

// ==============================
// Mic capture (raw PCM)
// ==============================
async function startMic(){
  if(!model)return;
  try{
    await requestNotifyPermission();

    try{
      stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:16000}});
    }catch(_){
      stream=await navigator.mediaDevices.getUserMedia({audio:true});
    }

    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')await audioCtx.resume();
    deviceSR=audioCtx.sampleRate;

    const source=audioCtx.createMediaStreamSource(stream);
    // Use ScriptProcessorNode to capture raw PCM samples
    scriptNode=audioCtx.createScriptProcessor(4096,1,1);
    source.connect(scriptNode);
    scriptNode.connect(audioCtx.destination);

    // Ring buffer for last 10 seconds at device sample rate
    const maxSamples=deviceSR*CHUNK_SEC;
    audioRingBuffer=new Float32Array(0);

    scriptNode.onaudioprocess=function(e){
      const input=e.inputBuffer.getChannelData(0);

      // Append to ring buffer
      const newBuf=new Float32Array(audioRingBuffer.length+input.length);
      newBuf.set(audioRingBuffer);
      newBuf.set(input,audioRingBuffer.length);

      // Keep only last 10 seconds
      if(newBuf.length>maxSamples){
        audioRingBuffer=newBuf.slice(-maxSamples);
      }else{
        audioRingBuffer=newBuf;
      }

      // Update energy bar
      let sum=0;
      for(let i=0;i<input.length;i++)sum+=input[i]*input[i];
      const rms=Math.sqrt(sum/input.length);
      const db=20*Math.log10(Math.max(rms,1e-10));
      const pct=Math.max(0,Math.min(100,(db+60)*2.5));
      el.eBar.style.width=pct+'%';
    };

    running=true;
    requestWake();
    curSpeaker=null;
    el.chips.innerHTML='';
    el.btnS.textContent='STOP';el.btnS.classList.add('running');
    el.letter.textContent='...';el.letter.style.color='#444';
    el.name.textContent='LISTENING';el.name.style.color='#444';
    el.status.textContent='RECORDING — FIRST ANALYSIS IN 3s';
    el.dot.style.background='#00ff88';el.dot.style.animation='breathe 1s infinite';
    el.box.style.background='#000';
    el.debug.textContent='SR:'+deviceSR+' buffer:0/'+maxSamples;

    // Run pyannote model every PROCESS_INTERVAL ms
    processTimer=setInterval(processAudio,PROCESS_INTERVAL);

  }catch(e){
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      el.status.textContent='MIC DENIED';
      el.name.textContent='ALLOW MIC & RELOAD';el.name.style.color='#ff4444';
    }else{
      el.status.textContent='ERROR: '+e.message;
    }
  }
}

function stopMic(){
  if(processTimer)clearInterval(processTimer);
  if(scriptNode){scriptNode.disconnect();scriptNode=null}
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close();
  running=false;releaseWake();
  audioRingBuffer=new Float32Array(0);
  el.btnS.textContent='START';el.btnS.classList.remove('running');
  el.dot.style.background='#333';el.dot.style.animation='none';
  el.status.textContent='STOPPED';
}

window.toggle=function(){running?stopMic():startMic()};

window.resetAll=function(){
  curSpeaker=null;
  el.letter.textContent='?';el.letter.style.color='#333';
  el.name.textContent='TAP START';el.name.style.color='#444';
  el.status.textContent='READY';el.box.style.background='#000';
  el.chips.innerHTML='';el.eBar.style.width='0%';el.eBar.style.background='#333';
};
</script>
</body>
</html>
