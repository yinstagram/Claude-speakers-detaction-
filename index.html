<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speaker Detect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#050505;color:#ccc;
  font-family:'SF Mono',ui-monospace,'Courier New',monospace;
  padding:16px;padding-top:env(safe-area-inset-top,16px);
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}

input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:#222;outline:none;border-radius:1px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#555;border:none}

.flash{position:fixed;inset:0;pointer-events:none;z-index:50;animation:fadeOut .4s ease-out forwards}
.btn{
cursor:pointer;border-radius:4px;font-family:inherit;
font-size:12px;letter-spacing:3px;text-transform:uppercase;
padding:14px;border:1px solid;transition:all .15s;
}
.btn:active{transform:scale(.97);opacity:.8}

#log-wrap{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
</style>

</head>
<body>

<div id="flash-el" class="flash" style="display:none"></div>

<!-- Header -->

<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #161616;padding-bottom:10px;margin-bottom:14px;flex-shrink:0">
  <div>
    <div style="font-size:10px;color:#444;letter-spacing:3px">SPEAKER DETECT</div>
    <div id="status-line" style="font-size:9px;color:#282828;margin-top:2px">STANDBY</div>
  </div>
  <div id="dot" style="width:8px;height:8px;border-radius:50%;background:#222"></div>
</div>

<!-- Main display -->

<div id="main-box" style="text-align:center;padding:32px 16px;margin-bottom:14px;border:1px solid #111;border-radius:6px;background:#080808;transition:all .35s;flex-shrink:0">
  <div id="speaker-letter" style="font-size:76px;font-weight:800;line-height:1;transition:color .3s;display:none"></div>
  <div id="speaker-label" style="font-size:10px;color:#444;margin-top:8px;letter-spacing:3px;display:none"></div>
  <div id="placeholder" style="font-size:13px;color:#282828;padding:18px 0">TAP START</div>
</div>

<!-- Energy bar -->

<div id="energy-wrap" style="margin-bottom:14px;padding:0 2px;display:none;flex-shrink:0">
  <div style="height:2px;background:#111;border-radius:1px;overflow:hidden">
    <div id="energy-bar" style="height:100%;border-radius:1px;width:0%;background:#222;transition:width .08s linear,background .3s"></div>
  </div>
</div>

<!-- Buttons -->

<div style="display:flex;gap:8px;margin-bottom:14px;flex-shrink:0">
  <button id="btn-start" class="btn" style="flex:1;background:#001100;border-color:#00ff8866;color:#00ff88" onclick="toggle()">▶ START</button>
  <button id="btn-reset" class="btn" style="padding:14px 16px;background:#080808;border-color:#222;color:#444;display:none" onclick="resetAll()">RESET</button>
</div>

<!-- Sensitivity -->

<div style="margin-bottom:16px;padding:0 2px;flex-shrink:0">
  <div style="display:flex;justify-content:space-between;font-size:9px;color:#333;margin-bottom:8px;letter-spacing:1px">
    <span>SENSITIVITY</span><span id="sens-val">62%</span>
  </div>
  <input type="range" id="sens-slider" min="35" max="85" value="62" oninput="onSens(this.value)">
  <div style="display:flex;justify-content:space-between;font-size:8px;color:#222;margin-top:6px">
    <span>MORE SPLITS</span><span>FEWER SPLITS</span>
  </div>
</div>

<!-- Speaker chips -->

<div id="chips" style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;flex-shrink:0"></div>

<!-- Timeline -->

<div id="log-section" style="border-top:1px solid #111;padding-top:12px;display:none;flex:1;min-height:0;display:flex;flex-direction:column">
  <div style="font-size:9px;color:#333;letter-spacing:2px;margin-bottom:8px;flex-shrink:0">
    CHANGE LOG · <span id="log-count">0</span>
  </div>
  <div id="log-wrap"></div>
</div>

<!-- Footer -->

<div style="margin-top:auto;padding:10px;background:#080808;border:1px solid #111;border-radius:4px;font-size:9px;color:#222;line-height:1.8;text-align:center;flex-shrink:0;margin-top:12px">
  100% LOCAL · NO DATA SENT · WEB AUDIO API<br>MEL-FREQUENCY EMBEDDINGS · COSINE SIMILARITY
</div>

<script>
const COLORS=["#FF6B35","#4ECDC4","#FFE66D","#A78BFA","#F38181","#34D399","#FCBAD3","#60A5FA"];
const FFT_SIZE=2048,NUM_BANDS=24,INTERVAL=80,WIN=12,CONFIRM_CHG=3,CONFIRM_NEW=5,PROF_MAX=60;

let running=false,audioCtx,analyser,stream,timer;
let filterbank,profiles=[],win=[],curSpeaker=null,silenceN=0,changeN=0,beepCtx;
let sensitivity=0.62;
let logData=[];

// DOM
const $=id=>document.getElementById(id);
const el={
  flash:$('flash-el'),status:$('status-line'),dot:$('dot'),
  main:$('main-box'),letter:$('speaker-letter'),label:$('speaker-label'),
  ph:$('placeholder'),energyW:$('energy-wrap'),energyB:$('energy-bar'),
  btnS:$('btn-start'),btnR:$('btn-reset'),sensV:$('sens-val'),
  chips:$('chips'),logSec:$('log-section'),logW:$('log-wrap'),logC:$('log-count')
};

// Mel scale
const hz2mel=f=>2595*Math.log10(1+f/700);
const mel2hz=m=>700*(10**(m/2595)-1);

function buildFB(fftSz,sr,n){
  const bins=fftSz/2,mL=hz2mel(80),mH=hz2mel(Math.min(8000,sr/2));
  const pts=Array.from({length:n+2},(_,i)=>Math.round(mel2hz(mL+(mH-mL)*i/(n+1))*fftSz/sr));
  return Array.from({length:n},(_,i)=>{
    const f=new Float32Array(bins);
    for(let j=pts[i];j<pts[i+1]&&j<bins;j++) f[j]=(j-pts[i])/(pts[i+1]-pts[i]);
    for(let j=pts[i+1];j<pts[i+2]&&j<bins;j++) f[j]=(pts[i+2]-j)/(pts[i+2]-pts[i+1]);
    return f;
  });
}

function extract(fft,fb,sr){
  const mel=fb.map(f=>{let e=0;for(let i=0;i<f.length;i++)e+=10**(fft[i]/20)*f[i];return Math.log(Math.max(e,1e-10))});
  let num=0,den=0;
  for(let i=0;i<fft.length;i++){const m=10**(fft[i]/20),freq=i*sr/FFT_SIZE;num+=freq*m;den+=m}
  mel.push(den>0?num/den/(sr/2):0);
  return mel;
}

function vecMean(vs){
  if(!vs.length)return null;
  const m=new Array(vs[0].length).fill(0);
  vs.forEach(v=>v.forEach((x,i)=>m[i]+=x));
  return m.map(x=>x/vs.length);
}

function cosSim(a,b){
  let d=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]**2;nb+=b[i]**2}
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-10);
}

function beep(idx){
  try{
    if(!beepCtx)beepCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=beepCtx.createOscillator(),g=beepCtx.createGain();
    o.connect(g);g.connect(beepCtx.destination);
    const f=520+idx*200;
    o.frequency.setValueAtTime(f,beepCtx.currentTime);
    o.frequency.setValueAtTime(f*1.25,beepCtx.currentTime+.04);
    o.frequency.setValueAtTime(f,beepCtx.currentTime+.08);
    g.gain.setValueAtTime(.25,beepCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,beepCtx.currentTime+.18);
    o.start(beepCtx.currentTime);o.stop(beepCtx.currentTime+.18);
  }catch(_){}
}

function flash(col){
  el.flash.style.background=col+"18";
  el.flash.style.display="block";
  el.flash.style.animation="none";
  void el.flash.offsetWidth;
  el.flash.style.animation="fadeOut .4s ease-out forwards";
  setTimeout(()=>el.flash.style.display="none",400);
}

function setSpeakerUI(idx){
  const c=COLORS[idx%COLORS.length];
  el.letter.textContent=String.fromCharCode(65+idx);
  el.letter.style.color=c;
  el.letter.style.textShadow=`0 0 60px ${c}30`;
  el.letter.style.display="block";
  el.letter.style.animation="popIn .3s ease";
  el.label.textContent="SPEAKER "+(idx+1);
  el.label.style.display="block";
  el.ph.style.display="none";
  el.main.style.borderColor=c+"25";
  el.main.style.background=c+"06";
}

function updateChips(total,active){
  el.chips.innerHTML="";
  for(let i=0;i<total;i++){
    const d=document.createElement("div");
    const c=COLORS[i%COLORS.length];
    const isA=i===active;
    d.style.cssText=`display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:3px;
      background:${isA?c+"12":"#0a0a0a"};border:1px solid ${isA?c+"40":"#181818"};transition:all .3s`;
    d.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${c};opacity:${isA?1:.3}"></div>
      <span style="font-size:10px;color:${isA?c:"#444"}">${String.fromCharCode(65+i)}</span>`;
    el.chips.appendChild(d);
  }
}

function addLog(idx){
  const t=new Date();
  logData.push({s:idx,t});
  el.logSec.style.display="flex";
  el.logC.textContent=logData.length;
  const c=COLORS[idx%COLORS.length];
  const row=document.createElement("div");
  row.style.cssText=`display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #0d0d0d;animation:slideIn .3s ease`;
  const ts=t.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  row.innerHTML=`<span style="font-size:9px;color:#282828;font-variant-numeric:tabular-nums;min-width:55px">${ts}</span>
    <div style="width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0"></div>
    <span style="font-size:10px;color:${c}">Speaker ${String.fromCharCode(65+idx)}</span>`;
  el.logW.insertBefore(row,el.logW.firstChild);
  // fade older
  const rows=el.logW.children;
  for(let i=0;i<rows.length;i++) rows[i].style.opacity=Math.max(.3,1-i*.1);
}

function onSens(v){sensitivity=v/100;el.sensV.textContent=v+"%"}

async function startMic(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=FFT_SIZE;analyser.smoothingTimeConstant=.25;
    src.connect(analyser);
    filterbank=buildFB(FFT_SIZE,audioCtx.sampleRate,NUM_BANDS);
    profiles=[];win=[];curSpeaker=null;silenceN=0;changeN=0;logData=[];
    el.logW.innerHTML="";el.logC.textContent="0";
    el.chips.innerHTML="";

    running=true;
    el.btnS.textContent="■ STOP";el.btnS.style.background="#110000";
    el.btnS.style.borderColor="#ff333366";el.btnS.style.color="#ff4444";
    el.btnR.style.display="block";el.energyW.style.display="block";
    el.ph.textContent="WAITING FOR VOICE";

    const fft=new Float32Array(analyser.frequencyBinCount);
    const sr=audioCtx.sampleRate;

    timer=setInterval(()=>{
      analyser.getFloatFrequencyData(fft);
      let tot=0,n=0;
      for(let i=0;i<fft.length;i++){if(fft[i]>-100){tot+=10**(fft[i]/10);n++}}
      const avg=n>0?10*Math.log10(tot/n):-100;
      const pct=Math.max(0,Math.min(100,(avg+75)*1.8));
      const thr=-48+(1-sensitivity)*18;
      const isSpeaking=avg>=thr;

      el.energyB.style.width=pct+"%";

      if(!isSpeaking){
        silenceN++;
        if(silenceN>6){
          el.status.textContent="○ LISTENING";
          el.dot.style.background="#ffaa00";el.dot.style.boxShadow="none";
          el.dot.style.animation="none";
          el.energyB.style.background="#222";
        }
        return;
      }
      silenceN=0;
      el.status.textContent="● VOICE ACTIVE";
      el.dot.style.background="#00ff88";
      el.dot.style.boxShadow="0 0 10px #00ff8866";
      el.dot.style.animation="pulse 1.2s infinite";

      const col=curSpeaker!==null?COLORS[curSpeaker%COLORS.length]:"#00ff88";
      el.energyB.style.background=col;

      const feat=extract(fft,filterbank,sr);
      win.push(feat);
      if(win.length>WIN)win.shift();
      if(win.length<5){el.ph.textContent="BUILDING PROFILE...";return}

      const curMean=vecMean(win);

      if(profiles.length===0){
        profiles.push({frames:[...win],mean:curMean});
        curSpeaker=0;setSpeakerUI(0);updateChips(1,0);addLog(0);
        return;
      }

      let bestI=-1,bestS=-1;
      for(let i=0;i<profiles.length;i++){const s=cosSim(curMean,profiles[i].mean);if(s>bestS){bestS=s;bestI=i}}

      if(bestS>=sensitivity){
        if(bestI!==curSpeaker){
          changeN++;
          if(changeN>=CONFIRM_CHG){
            curSpeaker=bestI;setSpeakerUI(bestI);updateChips(profiles.length,bestI);
            addLog(bestI);beep(bestI);flash(COLORS[bestI%COLORS.length]);
            changeN=0;win=[];
          }
        }else{
          changeN=0;
          const p=profiles[bestI];
          p.frames.push(...win.slice(-2));
          if(p.frames.length>PROF_MAX)p.frames=p.frames.slice(-PROF_MAX);
          p.mean=vecMean(p.frames);
        }
      }else if(bestS<sensitivity-.12){
        changeN++;
        if(changeN>=CONFIRM_NEW){
          const ni=profiles.length;
          profiles.push({frames:[...win],mean:curMean});
          curSpeaker=ni;setSpeakerUI(ni);updateChips(ni+1,ni);
          addLog(ni);beep(ni);flash(COLORS[ni%COLORS.length]);
          changeN=0;win=[];
        }
      }
    },INTERVAL);

  }catch(e){alert("Mic error: "+e.message)}
}

function stopMic(){
  if(timer)clearInterval(timer);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(audioCtx)audioCtx.close();
  running=false;
  el.btnS.textContent="▶ START";el.btnS.style.background="#001100";
  el.btnS.style.borderColor="#00ff8866";el.btnS.style.color="#00ff88";
  el.btnR.style.display="none";el.energyW.style.display="none";
  el.status.textContent="STANDBY";
  el.dot.style.background="#222";el.dot.style.boxShadow="none";el.dot.style.animation="none";
}

function toggle(){running?stopMic():startMic()}

function resetAll(){
  profiles=[];win=[];curSpeaker=null;silenceN=0;changeN=0;logData=[];
  el.letter.style.display="none";el.label.style.display="none";
  el.ph.style.display="block";el.ph.textContent="WAITING FOR VOICE";
  el.main.style.borderColor="#111";el.main.style.background="#080808";
  el.chips.innerHTML="";el.logW.innerHTML="";el.logC.textContent="0";
  el.logSec.style.display="none";
}
</script>

</body>
</html>
